# RGNB DKitty 任务配置（开启 Rank / Manifold 引导版本）
#
# 保留原始 baseline：configs/Dkitty.yaml
# 本文件在此基础上打开 lambda_rank / lambda_manifold，并训练 RankNet / VAE。

task:
  name: DKittyMorphology-Exact-v0
  normalize_x: true
  normalize_y: true

rgnb:
  ne: 8
  np: 1024
  m_steps: 100
  # 对齐 ROOT Dkitty_GPFixed: sampling_from_GP_lr=1e-3
  eta: 1.0e-3
  l0: 1.0
  delta: 0.5
  # 对齐 ROOT Dkitty_GPFixed: noise=0.01
  gp_noise: 1.0e-2
  # GP 训练拟合样本上限（DKitty 不截断）
  gp_max_fit: 100000
  # 与 ROOT threshold_diff 一致
  gp_threshold_diff: 1.0e-3
  # 对齐 ROOT: type_of_initial_points=highest
  type_of_initial_points: highest
  bridge_T: 200
  # 与 ROOT use_fixed_gp_posterior 一致：100 epoch、val_frac=0.1、batch 64、gp_seed=0
  bridge_epochs: 100
  bridge_lr: 1.0e-3
  val_frac: 0.1
  bridge_batch_size: 64
  gp_seed: 0
  top_k: 128
  cfg_scale: 1.0

  # ===== RGNB 额外引导开关 =====
  # Rank 梯度引导（归一化后的梯度 * lambda_rank，建议 0.01-0.1）
  lambda_rank: 0.03
  # VAE 流形密度引导（归一化后的梯度 * lambda_manifold，建议 0.01-0.1）
  lambda_manifold: 0.05
  # 引导仅在采样后期施加：0.5 表示仅在后 50% 步骤中注入引导
  guidance_start_ratio: 0.5
  # Brownian Bridge 训练阶段 CFG dropout 概率（与 training.classifier_free_guidance_prob 一致）
  cfg_dropout: 0.15
  # 目标分外推倍率：仅在未提供 high_cond_score 时使用
  target_extrap_factor: 1.0

  vae_latent_dim: 16
  # EMA（与 ROOT 一致，测试时用 EMA 权重，常提升 1～3 点）
  use_ema: true
  ema_decay: 0.995
  start_ema_step: 4000
  update_ema_interval: 8

training:
  # 为 RankNet / VAE 打开训练轮数（可以根据资源再调大）
  ranknet_epochs: 50
  vae_epochs: 50

  # Brownian Bridge 训练阶段是否启用 CFG dropout（配合 rgnb.cfg_dropout 使用）
  use_classifier_free_guidance: true
  classifier_free_guidance_prob: 0.15

testing:
  clip_denoised: false
  num_candidates: 128
  percentile_sampling: 0.2
  type_sampling: highest
  # 采样阶段启用 CFG；负权重有利于往高分方向外推
  use_classifier_free_guidance: true
  classifier_free_guidance_weight: -1.5
  alpha: 0.8

