# RGNB TFBind8 任务配置

task:
  name: TFBind8-Exact-v0
  normalize_x: true
  normalize_y: true

rgnb:
  ne: 8
  np: 1024
  m_steps: 100
  eta: 5.0e-3
  l0: 1.0
  delta: 0.5
  gp_noise: 1.0e-3
  bridge_T: 100
  bridge_epochs: 100
  bridge_lr: 1.0e-3
  top_k: 128
  cfg_scale: 2.0
  lambda_rank: 0.2
  lambda_manifold: 0.1
  vae_latent_dim: 16

training:
  # ListNet 代理模型（RankNet）训练轮数
  ranknet_epochs: 200
  # Manifold VAE 训练轮数
  vae_epochs: 50
  # Listwise 数据增强超参：每个 list 的长度 m
  list_size: 1000
  # 构造的 list 总数 n
  num_lists: 10000
  # Listwise DataLoader 的 batch_size
  listwise_batch_size: 8
  # 采样时是否允许有放回
  listwise_replacement: true
  # ListNet 训练的学习率与正则
  ranknet_lr: 3.0e-4
  ranknet_weight_decay: 1.0e-5
