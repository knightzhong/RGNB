# RGNB DKitty 任务配置

task:
  name: DKittyMorphology-Exact-v0
  normalize_x: true
  normalize_y: true

rgnb:
  ne: 8
  np: 1024
  m_steps: 100
  eta: 5.0e-3
  l0: 1.0
  delta: 0.5
  gp_noise: 1.0e-3
  bridge_T: 200
  bridge_epochs: 200
  bridge_lr: 1.0e-3
  top_k: 128
  cfg_scale: 1.0
  lambda_rank: 0.0
  lambda_manifold: 0.0
  vae_latent_dim: 16

training:
  ranknet_epochs: 50
  vae_epochs: 50
