# RGNB DKitty 任务配置

task:
  name: DKittyMorphology-Exact-v0
  normalize_x: true
  normalize_y: true

rgnb:
  ne: 8
  np: 1024
  m_steps: 100
  # 对齐 ROOT Dkitty_GPFixed: sampling_from_GP_lr=1e-3
  eta: 1.0e-3
  l0: 1.0
  delta: 0.5
  # 对齐 ROOT Dkitty_GPFixed: noise=0.01
  gp_noise: 1.0e-2
  # GP 训练拟合样本上限（DKitty 不截断）
  gp_max_fit: 100000
  # 与 ROOT threshold_diff 一致
  gp_threshold_diff: 1.0e-3
  # 对齐 ROOT: type_of_initial_points=highest
  type_of_initial_points: highest
  bridge_T: 200
  # 与 ROOT use_fixed_gp_posterior 一致：100 epoch、val_frac=0.1、batch 64、gp_seed=0
  bridge_epochs: 100
  bridge_lr: 1.0e-3
  val_frac: 0.1
  bridge_batch_size: 64
  gp_seed: 0
  top_k: 128
  cfg_scale: 1.0
  lambda_rank: 0.0
  lambda_manifold: 0.0
  vae_latent_dim: 16
  # EMA（与 ROOT 一致，测试时用 EMA 权重，常提升 1～3 点）
  use_ema: true
  ema_decay: 0.995
  start_ema_step: 4000
  update_ema_interval: 8

training:
  # 若希望仅作为 baseline，不训练 RankNet/VAE，可保持 0
  ranknet_epochs: 0
  vae_epochs: 0
  # 即便当前不训练 RankNet，也给出 ListNet 默认超参，便于后续开启
  list_size: 1000
  num_lists: 10000
  listwise_batch_size: 8
  listwise_replacement: true
  ranknet_lr: 3.0e-4
  ranknet_weight_decay: 1.0e-5

testing:
  clip_denoised: false
  num_candidates: 128
  percentile_sampling: 0.2
  type_sampling: highest
  # 设为 true 可启用 CFG（负权重增强高目标），有时能再提升约 0.5～1 点
  use_classifier_free_guidance: false
  classifier_free_guidance_weight: -1.5
  alpha: 0.8
